<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FizzBuzz - Prueba de Nivel - Javascript</title>
</head>
<body>

    <h1>FizzBuzz</h1>

    <label for="number-input">Introduce un número</label>
    <input type="text" id="number-input" placeholder="Escribe aquí tu número">

    <button id="btn-result">Resultado</button>  <!--tengo que quitar el onclick porque con la propiedad type = module en el script, pasa a ser privado y no lo lee, por eso guardamos con un id y añadimos addEventListener en el .js fuera de la función para que lo pueda leer-->
    <br>
    <div id="response"></div>

    <script type="module" src="index.js"></script>
</body>
